<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Edit - Teacher Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@5/dist/jspreadsheet.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@5/dist/index.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px; font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            background: #f8f9fa; color: #1a1a2e;
        }

        /* ── Header bar ── */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding: 12px 20px;
            background: #fff; border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .actions { display: flex; gap: 12px; align-items: center; }
        #bulk-status {
            padding: 8px 16px; border-radius: 6px; font-size: 13px;
            font-weight: 500; background: #e8f5e9; color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .btn-save {
            padding: 10px 22px; background: #22c77a; color: #fff;
            border: none; border-radius: 8px; font-weight: 700;
            font-size: 14px; cursor: pointer; transition: background .2s;
        }
        .btn-save:hover { background: #1aad6a; }

        /* ── Spreadsheet container ── */
        #spreadsheet {
            flex: 1; border-radius: 10px; overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            background: #fff;
        }

        /* ── jspreadsheet light-theme overrides ── */
        .jss, .jss table { background: #fff !important; color: #1a1a2e !important; }

        .jss thead td {
            background: #f1f3f5 !important; color: #495057 !important;
            border-color: #dee2e6 !important;
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .jss tbody td {
            background: #fff !important; color: #212529 !important;
            border-color: #e9ecef !important; font-size: 13px;
        }

        .jss tbody tr:nth-child(even) td { background: #f8f9fa !important; }

        .jss tbody td:hover { background: #e3f2fd !important; }

        /* Selected / highlighted cells — light blue instead of dark */
        .jss tbody td.selected,
        .jss tbody td.highlight,
        .jss td.jss_selected {
            background: #d0e8ff !important; color: #0d47a1 !important;
            border-color: #42a5f5 !important;
        }

        /* Row header (numbers) */
        .jss thead td:first-child,
        .jss tbody td:first-child {
            background: #f1f3f5 !important; color: #868e96 !important;
            font-weight: 600;
        }

        /* Corner drag handle */
        .jss .jss_corner { background: #42a5f5 !important; border-color: #42a5f5 !important; }

        /* Editor input */
        .jss input, .jss textarea, .jss select {
            background: #fff !important; color: #212529 !important;
            border: 2px solid #42a5f5 !important; border-radius: 2px;
        }

        /* Success / error row feedback from save */
        .row-created td { background: #e8f5e9 !important; color: #2e7d32 !important; }
        .row-updated td { background: #e3f2fd !important; color: #1565c0 !important; }
        .row-error td { background: #ffebee !important; color: #c62828 !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="bulk-title">Bulk Edit</h1>
        <div class="actions">
            <div id="bulk-status" style="background:#f0f0f0; border:1px solid #ddd;">Loading...</div>
            <button class="btn-save" onclick="saveData()">💾 Save All</button>
        </div>
    </div>
    <div id="spreadsheet"></div>

    <script src="/static/js/app.js"></script>
    <script>
        requireAuth('TEACHER');
        const urlParams = new URLSearchParams(window.location.search);
        const entity = urlParams.get('entity');
        
        let spreadsheetInstance = null;
        let worksheet = null;
        let dataRows = [];

        async function init() {
            if (entity === 'attendance') {
                document.getElementById('bulk-title').textContent = `Bulk Edit — Attendance`;
                await initAttendance();
            } else if (entity === 'marks') {
                document.getElementById('bulk-title').textContent = `Bulk Edit — Marks`;
                await initMarks();
            } else {
                document.getElementById('bulk-status').textContent = 'Invalid entity specified.';
            }
        }

        async function initAttendance() {
            const offeringId = urlParams.get('offering_id');
            const date = urlParams.get('date');
            const sectionId = urlParams.get('section_id') || '';
            
            let url = `/teacher/attendance/${offeringId}/date/${date}`;
            if (sectionId) url += `?section_id=${sectionId}`;
            
            const res = await api(url);
            if (!res) return;
            const records = await res.json();
            
            dataRows = records.map(r => {
                const row = [r.student_id, r.roll_number, r.student_name, r.section || ''];
                for (let i = 1; i <= 7; i++) {
                    const pKey = `period_${i}`;
                    row.push(r.periods && r.periods[pKey] ? r.periods[pKey] : ''); // PRESENT or ABSENT or empty
                }
                return row;
            });
            
            const columns = [
                { type: 'hidden', title: 'Student ID' }, // col 0
                { type: 'text', title: 'Roll Number', readOnly: true, width: 120 }, // col 1
                { type: 'text', title: 'Name', readOnly: true, width: 220 }, // col 2
                { type: 'text', title: 'Section', readOnly: true, width: 90 } // col 3
            ];
            
            for (let i = 1; i <= 7; i++) {
                columns.push({
                    type: 'dropdown',
                    title: `Period ${i}`,
                    width: 100,
                    source: ['', 'PRESENT', 'ABSENT']
                }); // col 4 to 10
            }
            
            renderGrid(columns);
        }

        async function initMarks() {
            const assessmentId = urlParams.get('assessment_id');
            const maxMarks = urlParams.get('max_marks') || '';
            
            const res = await api(`/teacher/marks/${assessmentId}/grid`);
            if (!res) return;
            const records = await res.json();
            
            dataRows = records.map(r => {
                return [r.student_id, r.roll_number, r.student_name, r.section || '', r.marks_obtained !== null ? r.marks_obtained : '', r.max_marks || maxMarks];
            });
            
            const columns = [
                { type: 'hidden', title: 'Student ID' }, // 0
                { type: 'text', title: 'Roll Number', readOnly: true, width: 120 }, // 1
                { type: 'text', title: 'Name', readOnly: true, width: 220 }, // 2
                { type: 'text', title: 'Section', readOnly: true, width: 90 }, // 3
                { type: 'numeric', title: 'Marks Obtained', width: 120 }, // 4
                { type: 'numeric', title: 'Max Marks', readOnly: true, width: 100 } // 5
            ];
            
            renderGrid(columns);
        }

        function renderGrid(columns) {
            const container = document.getElementById('spreadsheet');
            spreadsheetInstance = jspreadsheet(container, {
                worksheets: [{
                    data: dataRows,
                    columns: columns,
                    minDimensions: [columns.length, 5],
                    tableOverflow: true,
                    tableWidth: '100%',
                    tableHeight: `${window.innerHeight - 100}px`,
                    defaultColWidth: 100,
                    allowInsertRow: false,
                    allowDeleteRow: false,
                    allowInsertColumn: false,
                    allowDeleteColumn: false,
                    columnSorting: true,
                }],
                contextMenu: function() { return false; },
            });
            worksheet = spreadsheetInstance[0];
            document.getElementById('bulk-status').textContent = `${dataRows.length} students loaded.`;
        }

        async function saveData() {
            document.getElementById('bulk-status').textContent = 'Saving...';
            document.querySelector('.btn-save').disabled = true;
            
            const data = worksheet.getData();
            
            try {
                if (entity === 'attendance') {
                    await saveAttendance(data);
                } else if (entity === 'marks') {
                    await saveMarks(data);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('bulk-status').textContent = 'Error saving.';
            } finally {
                document.querySelector('.btn-save').disabled = false;
            }
        }

        async function saveAttendance(gridData) {
            const offeringId = urlParams.get('offering_id');
            const date = urlParams.get('date');
            
            const records = [];
            gridData.forEach((row, rIndex) => {
                const studentId = parseInt(row[0]);
                if (!studentId) return;
                
                for (let i = 1; i <= 7; i++) {
                    const status = row[i + 3]; // col 4 is Period 1
                    if (status === 'PRESENT' || status === 'ABSENT') {
                        records.push({
                            student_id: studentId,
                            period: i,
                            status: status
                        });
                    }
                }
            });
            
            if (records.length === 0) {
                document.getElementById('bulk-status').textContent = 'No attendance data to save.';
                return;
            }
            
            const payload = {
                offering_id: parseInt(offeringId),
                date: date,
                records: records
            };
            
            const res = await api('/teacher/attendance/bulk', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            
            if (res) {
                document.getElementById('bulk-status').textContent = `Saved ${records.length} updates successfully!`;
                
                // Color all rows green as success
                for (let i = 0; i < gridData.length; i++) {
                    worksheet.rows[i].classList.add('row-updated');
                }
            } else {
                document.getElementById('bulk-status').textContent = 'Failed to save attendance.';
            }
        }

        async function saveMarks(gridData) {
            const assessmentId = urlParams.get('assessment_id');
            const records = [];
            
            gridData.forEach((row, i) => {
                const studentId = parseInt(row[0]);
                const marksObtained = row[4];
                
                if (studentId && marksObtained !== '' && marksObtained !== null) {
                    records.push({
                        student_id: studentId,
                        marks_obtained: parseFloat(marksObtained)
                    });
                }
            });
            
            if (records.length === 0) {
                document.getElementById('bulk-status').textContent = 'No marks to save.';
                return;
            }
            
            const payload = {
                assessment_id: parseInt(assessmentId),
                records: records
            };
            
            const res = await api('/teacher/marks', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            
            if (res) {
                 document.getElementById('bulk-status').textContent = `Saved ${records.length} marks successfully!`;
                 for (let i = 0; i < gridData.length; i++) {
                    if(worksheet.rows[i]) worksheet.rows[i].classList.add('row-updated');
                }
            } else {
                document.getElementById('bulk-status').textContent = 'Failed to save marks.';
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
