<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS — Change Password</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Change Password</h1>
            <p>You must change your password before continuing</p>
            <p style="font-size:0.78rem;color:var(--text-muted);margin-top:-16px;">
                Minimum 8 characters, must include letters and numbers.
            </p>
            <div id="alert" class="alert"></div>
            <form id="changeForm">
                <div class="form-group">
                    <label for="old_password">Current Password</label>
                    <input type="password" id="old_password" required>
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Change Password</button>
            </form>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
    <script>
        if (!getToken()) window.location.href = '/';

        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const old_password = document.getElementById('old_password').value;
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (new_password !== confirm_password) {
                showAlert('alert', 'Passwords do not match', 'error');
                return;
            }

            const res = await api('/auth/change-password', {
                method: 'POST',
                body: JSON.stringify({ old_password, new_password })
            });
            if (!res) return;
            const data = await res.json();

            if (res.ok) {
                showAlert('alert', 'Password changed! Redirecting...', 'success');
                const role = getRole();
                setTimeout(() => {
                    if (role === 'ADMIN') window.location.href = '/admin/dashboard';
                    else if (role === 'TEACHER') window.location.href = '/teacher/dashboard';
                    else window.location.href = '/student/dashboard';
                }, 1500);
            } else {
                showAlert('alert', data.detail || 'Failed to change password', 'error');
            }
        });
    </script>
</body>
</html>
