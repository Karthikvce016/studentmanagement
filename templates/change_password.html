<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS - Change Password</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="login-wrapper">
        <section class="auth-visual" aria-label="Account security">
            <div class="auth-visual-card">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1100&q=80" alt="Laptop on a study desk">
                <div class="auth-visual-copy">
                    <p class="eyebrow">Account Setup</p>
                    <h2>Create a password before opening the dashboard.</h2>
                    <p>Use at least eight characters with letters and numbers.</p>
                </div>
            </div>
        </section>
        <div class="login-card">
            <h1>Change Password</h1>
            <p>Set a new password to continue</p>
            <div id="alert" class="alert"></div>
            <form id="changeForm">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Change Password</button>
            </form>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
    <script>
        if (!getToken()) window.location.href = '/';

        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (new_password !== confirm_password) {
                showAlert('alert', 'Passwords do not match', 'error');
                return;
            }

            const res = await api('/auth/change-password', {
                method: 'POST',
                body: JSON.stringify({ new_password })
            });
            if (!res) return;
            const data = await res.json();

            if (res.ok) {
                showAlert('alert', 'Password changed! Redirecting...', 'success');
                const role = getRole();
                setTimeout(() => {
                    if (role === 'ADMIN') window.location.href = '/admin/dashboard';
                    else if (role === 'TEACHER') window.location.href = '/teacher/dashboard';
                    else window.location.href = '/student/dashboard';
                }, 1500);
            } else {
                showAlert('alert', data.detail || 'Failed to change password', 'error');
            }
        });
    </script>
</body>
</html>
